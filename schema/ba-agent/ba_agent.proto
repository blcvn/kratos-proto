syntax = "proto3";

package baagent.v1;

option go_package = "github.com/blcvn/kratos-proto/go/ba-agent;baagent";
option java_package = "com.blcvn.kratos.protos.baagent";

import "ba-agent/base.proto";
import "google/protobuf/struct.proto";

// =======================
// BA Agent Service
// =======================
service BAAgentService {
  // Task Execution
  rpc ExecuteTask(ExecuteTaskRequest) returns (ExecuteTaskResponse) {
  }
  
  rpc SubmitInput(SubmitInputRequest) returns (stream StreamExecuteTaskResponse) {
  }
  
  rpc StreamExecuteTask(ExecuteTaskRequest) returns (stream StreamExecuteTaskResponse) {
  }
  
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse) {
  }
  
  // Tools
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse) {
  }
  
  // Memory
  rpc GetMemory(GetMemoryRequest) returns (GetMemoryResponse) {
  }
  
  rpc ClearMemory(ClearMemoryRequest) returns (ClearMemoryResponse) {
  }

  // 3-Tier Workflow Orchestration
  rpc GenerateRequirement(GenerateRequirementRequest) returns (GenerateRequirementResponse) {
  }

  rpc GetDocument(GetDocumentRequest) returns (ExecuteTaskResponse) {
  }

  rpc GetTierIndex(GetDocumentRequest) returns (ExecuteTaskResponse) {
  }

  rpc GetTierOutline(GetDocumentRequest) returns (ExecuteTaskResponse) {
  } 

  rpc GetTierFull(GetDocumentRequest) returns (ExecuteTaskResponse) {
  }

  rpc ApproveRequirement(ApproveRequirementRequest) returns (EmptyResponse) {
  }

  rpc ReviewRequirement(ReviewRequirementRequest) returns (ExecuteTaskResponse) {
  }
  
  rpc GetReviewResult(GetTaskRequest) returns (GetTaskResponse) {
  }

  rpc SaveEditedDocument(GenerateRequirementRequest) returns (EmptyResponse) {
  }

  rpc RegenerateRequirement(GenerateRequirementRequest) returns (GenerateRequirementResponse) {
  }

  rpc GetLineage(GetDocumentRequest) returns (EmptyResponse) {
  }

  // V3 Streaming — Delivery V3
  rpc StreamEvents(StreamRequest) returns (stream StreamEvent) {
  }

  rpc CancelStream(CancelStreamRequest) returns (CancelStreamResponse) {
  }
}

// =======================
// Domain Enums
// =======================

enum RequirementTier {
  TIER_UNSPECIFIED = 0;
  TIER_PRD = 1;
  TIER_URD_INDEX = 2;
  TIER_URD_OUTLINE = 3;
  TIER_URD_FULL = 4;
}

// V3: Streaming enums
enum StreamType {
  STREAM_TYPE_UNSPECIFIED = 0;
  STREAM_TYPE_TASK = 1;
  STREAM_TYPE_WORKFLOW = 2;
  STREAM_TYPE_REVIEW = 3;
}

enum StreamEventType {
  STREAM_EVENT_TYPE_UNSPECIFIED = 0;
  STREAM_EVENT_TYPE_STREAM_START = 1;
  STREAM_EVENT_TYPE_STATE_CHANGE = 2;
  STREAM_EVENT_TYPE_TIER_READY = 3;
  STREAM_EVENT_TYPE_FINAL_RESULT = 4;
  STREAM_EVENT_TYPE_ERROR = 5;
  STREAM_EVENT_TYPE_KEEPALIVE = 6;
  STREAM_EVENT_TYPE_WORKFLOW_TRANSITION = 7;
}

enum StreamStatus {
  STREAM_STATUS_UNSPECIFIED = 0;
  STREAM_STATUS_QUEUED = 1;
  STREAM_STATUS_RUNNING = 2;
  STREAM_STATUS_COMPLETED = 3;
  STREAM_STATUS_FAILED = 4;
  STREAM_STATUS_CANCELED = 5;
  STREAM_STATUS_TIMEOUT = 6;
  STREAM_STATUS_WAITING_FOR_INPUT = 7;
}

// =======================
// Request Messages
// =======================

message GenerateRequirementRequest {
  Metadata metadata = 1;
  Signature signature = 2;
  string project_id = 3;
  string parent_document_id = 4; // PRD ID or Parent Tier ID
  RequirementTier tier = 5;
  string module_name = 6;
  string content = 7; // For initial PRD upload
}

message GetDocumentRequest {
  Metadata metadata = 1;
  Signature signature = 2;
  string document_id = 3;
}

message ApproveRequirementRequest {
  Metadata metadata = 1;
  Signature signature = 2;
  string tier_id = 3;
  string parent_id = 4;
  RequirementTier tier = 5;
}

message ReviewRequirementRequest {
  Metadata metadata = 1;
  Signature signature = 2;
  string document_id = 3;
  string comment = 4;
  string action_type = 5;
  string affected_sections = 6; // JSON string
}

message ExecuteTaskPayload {
  string user_id = 1;
  string session_id = 2;
  string task_description = 3;
  int32 max_iterations = 4;
  string workflow_mode = 5; // "interactive" (default) or "pipeline" (future)
  repeated ReActStep history = 6;
}

message ExecuteTaskRequest {
  Metadata metadata = 1;
  Signature signature = 2;
  ExecuteTaskPayload payload = 3;
}

message GetTaskRequest {
  Metadata metadata = 1;
  Signature signature = 2;
  string task_id = 3;
}

message ListToolsRequest {
  Metadata metadata = 1;
  Signature signature = 2;
}

message GetMemoryRequest {
  Metadata metadata = 1;
  Signature signature = 2;
  string session_id = 3;
}

message ClearMemoryRequest {
  Metadata metadata = 1;
  Signature signature = 2;
  string session_id = 3;
}

message SubmitInputRequest {
  Metadata metadata = 1;
  Signature signature = 2;
  string task_id = 3;
  string input_data = 4;
}

// V3: Streaming request
message StreamRequest {
  Metadata metadata = 1;
  Signature signature = 2;
  string stream_id = 3;        // V3: Session stream ID
  int64 last_seq = 4;          // For reconnect — replay events after this seq
  string project_id = 5;       // For auth / IDOR check
  StreamType stream_type = 6;  // Legacy/optional stream type filtering
  bool safe_mode = 7;          // Future: enable safe-mode backpressure
}

// V3: Cancel stream request
message CancelStreamRequest {
  Metadata metadata = 1;
  Signature signature = 2;
  StreamType stream_type = 3;
  string correlation_id = 4;
  string reason = 5;
  string stream_id = 6;        // V3: Support cancel by stream_id
}

// =======================
// Response Messages
// =======================

message EmptyResponse {
  Metadata metadata = 1;
  Signature signature = 2;
  Result result = 3;
}

message GenerateRequirementResponse {
  Metadata metadata = 1;
  Result result = 2;
  string job_id = 3;
  string document_id = 4;
  string workflow_run_id = 5; // V3: for streaming subscription
}

message ExecuteTaskResponse {
  Metadata metadata = 1;
  Signature signature = 2;
  Result result = 3;
  AgentTask task = 4;
}

message StreamExecuteTaskResponse {
  Metadata metadata = 1;
  Signature signature = 2;
  Result result = 3;
  ReActStep step = 4;
  bool is_final = 5;
}

message GetTaskResponse {
  Metadata metadata = 1;
  Signature signature = 2;
  Result result = 3;
  AgentTask task = 4;
}

message ListToolsResponse {
  Metadata metadata = 1;
  Signature signature = 2;
  Result result = 3;
  repeated Tool tools = 4;
}

message GetMemoryResponse {
  Metadata metadata = 1;
  Signature signature = 2;
  Result result = 3;
  Memory memory = 4;
}

message ClearMemoryResponse {
  Metadata metadata = 1;
  Signature signature = 2;
  Result result = 3;
}

// V3: Streaming response event
message StreamEvent {
  string id = 1;                      // Unique event ID (UUID)
  int64 seq = 2;                      // Monotonic sequence number per stream_id
  StreamEventType event_type = 3;
  StreamStatus status = 4;
  StreamType stream_type = 5;
  string stream_id = 6;               // V3: Session stream ID
  string correlation_id = 7;          // Specific job ID
  string task_id = 8;
  string workflow_run_id = 9;
  string review_id = 10;
  string document_id = 11;
  string project_id = 12;
  string timestamp = 13;              // ISO 8601
  google.protobuf.Struct data = 14;   // Flexible data payload
  string error_code = 15;
  string error_message = 16;
  bool retryable = 17;
}

// V3: Cancel stream response
message CancelStreamResponse {
  Metadata metadata = 1;
  Result result = 2;
}

