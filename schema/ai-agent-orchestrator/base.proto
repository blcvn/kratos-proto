syntax = "proto3";

package orchestrator.v1;

option go_package = "github.com/blcvn/kratos-proto/go/ai-agent-orchestrator;orchestrator";
option java_package = "com.blcvn.kratos.protos.orchestrator";

message Metadata {
  string request_id = 1;
  int64 request_time = 2;
  string version = 3;
}

message Result {
  int32 code = 1;
  string message = 2;
}

message Signature {
  enum SignatureType {
    NO_USE_TYPE = 0;
    J = 1;
    C = 2;
    S = 3;
  }
  SignatureType s_type = 1;
  string s = 2;
  bytes b = 3;
}
